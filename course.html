<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
    <div class="header-top">
        <div>
            <h1 id="courseName">Loading...</h1>
            <p id="department"></p>
        </div>
    </div>
    <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="rankings.html">Rankings</a>
    </nav>
</header>

<main>
    <section class="page-section">
        <a class="secondary-button link-button" href="courses.html">Back to Courses</a>
        <div class="stats-card">
            <h2>Course Statistics</h2>
            <p>Average Difficulty: <span id="averageDifficulty">0</span></p>
            <p>Average Enjoyment: <span id="averageEnjoyment">0</span></p>
            <p>Average Workload: <span id="averageWorkload">0</span></p>
        </div>
    </section>

    <section class="reviews-section">
        <h2>Reviews</h2>
        <div id="reviews"></div>
    </section>

    <section class="review-form-section">
        <h2>Leave Review</h2>
        <form id="reviewForm">
            <div class="form-row">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div class="form-row">
                <label for="enjoyment">Enjoyment</label>
                <select id="enjoyment">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div class="form-row">
                <label for="workload">Workload</label>
                <select id="workload">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <textarea id="reviewText" placeholder="Write review..." rows="5"></textarea>
            <button type="submit">Submit Review</button>
        </form>
    </section>
</main>

<script src="js/coursePage.js"></script>
</body>
</html>
