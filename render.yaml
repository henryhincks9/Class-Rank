services:
  - type: web
    name: class-rank
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python migrate.py && python seed_db.py
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT server:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ADMIN_PW
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: RATE_LIMIT_DEFAULTS
        value: "5000 per day,1000 per hour"
      - key: RATE_LIMIT_REGISTER
        value: "30 per minute"
      - key: RATE_LIMIT_LOGIN
        value: "60 per minute"
      - key: RATE_LIMIT_REVIEW_POST
        value: "120 per hour"
