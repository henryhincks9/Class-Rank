services:
  - type: web
    name: class-rank
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT server:app
    envVars:
      - key: FLASK_SECRET_KEY
        value: ""
      - key: DATABASE_URL
        value: ""
